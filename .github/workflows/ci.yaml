name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read
  id-token: write # needed for depot

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - run: yarn install --immutable
      - run: yarn lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - run: yarn install --immutable
      - run: yarn tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - run: yarn install --immutable
      - run: yarn test

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          base-ref: 'main'
          head-ref: '${{ github.sha }}'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - run: yarn install --immutable
      - run: yarn tsc

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3


  build:
    name: Build
    runs-on: depot-ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Docker tags and metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          bake-target: "testkube-backstage-meta"
          images: |
            kubeshop/testkube-backstage
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build
        uses: depot/bake-action@v1
        with:
          files: |
            ./docker-bake.hcl
            ${{ steps.meta.outputs.bake-file }}
          targets: testkube-backstage-meta
          provenance: mode=max
          sbom: true
          # Only main.
          push: ${{ github.ref == 'refs/heads/main' }}
          save: true
